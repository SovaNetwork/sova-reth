[workspace.package]
version = "0.0.2"
edition = "2021"
license = "MIT"

[workspace]
members = [
    "bin/corsa-reth/",
    "crates/chainspec/",
    "crates/cli/",
    "crates/node/",
]
default-members = ["bin/corsa-reth"]

# Explicitly set the resolver to version 2, which is the default for packages with edition >= 2021
# https://doc.rust-lang.org/edition-guide/rust-2021/default-cargo-resolver.html
resolver = "2"

[workspace.dependencies]
# Internal crates
corsa-reth-cli = { path = "crates/cli" }
corsa-reth-chainspec = { path = "crates/chainspec" }
corsa-reth-node = { path = "crates/node" }

# Reth dependencies
reth = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-chainspec = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-cli = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-cli-commands = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-cli-runner = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-cli-util = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-db = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3", default-features = false }
reth-ethereum-forks = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-evm-ethereum = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-network-peers = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-node-api = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-node-builder = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-node-core = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-node-metrics = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-primitives = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }
reth-node-ethereum = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3", features = ["test-utils"] }
reth-tracing = { git = "https://github.com/paradigmxyz/reth.git", tag = "v1.1.3" }

# Alloy dependencies
alloy-chains = { version = "0.1.32", default-features = false }
alloy-consensus = { version = "0.7.3", default-features = false }
alloy-dyn-abi = "0.8.11"
alloy-genesis = { version = "0.7.3", default-features = false }
alloy-primitives = { version = "0.8.11", default-features = false }
alloy-sol-types = "0.8.11"

# Bitcoin dependencies
bitcoin = { version = "0.31.1", features = ["bitcoinconsensus"] }
bitcoincore-rpc = "0.18.0"

# Other dependencies
clap = { version = "4.4.18", features = ["derive"] }
derive_more = { version = "1", default-features = false, features = ["full"] }
eyre = "0.6.12"
hex = "0.4.3"
parking_lot = "0.12.3"
reqwest = { version = "0.12", features = ["blocking", "json"] }
serde = { version = "1.0.195", features = ["derive"] }
serde_json = "1.0.94"
tokio = { version = "1.39.3", features = ["full"] }
toml = "0.8.10"
tracing = "0.1.0"